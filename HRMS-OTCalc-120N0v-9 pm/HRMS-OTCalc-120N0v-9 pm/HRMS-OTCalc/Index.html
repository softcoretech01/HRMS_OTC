
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTG Overtime App</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f8f9fa;
    }

    .sidebar {
      height: 100vh;
      background-color: #004C80; /* Base BTG Blue */
      color: white;
      padding-top: 15px;
    }

    /* Sidebar Header */
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 25px;
    }

    .sidebar-header img {
      height: 48px;
      width: auto;
      margin-right: 8px;
    }

    .sidebar-header h5 {
      margin: 0;
      color: #ffffff;
      font-weight: 600;
      font-size: 1.25rem;
      letter-spacing: 0.5px;
      font-family: "Poppins", "Segoe UI", sans-serif;
    }

    /* Menu colors */
    .sidebar a {
      display: block;
      color: white;
      padding: 12px 15px;
      margin: 5px 10px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s ease-in-out;
    }

    .menu-dashboard { background-color: #d35400; }
    .menu-emp { background-color: #1abc9c; }
    .menu-config { background-color: #3498db; }
    .menu-att { background-color: #e67e22; }
    .menu-approval { background-color: #9b59b6; color: #000; }
    .menu-report { background-color: #2ecc71; }

    .sidebar a:hover {
      opacity: 0.85;
      transform: scale(1.03);
    }

    .sidebar a.active {
      border: 2px solid #ffffff;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.6);
    }

    /* Content area */
    .content-area {
      border: 2px solid #007BFF;
      border-radius: 10px;
      background-color: white;
      padding: 20px;
      
    }

    footer {
      text-align: center;
      padding: 10px;
      background-color: #e9ecef;
      font-size: 14px;
    }

    /* Buttons */
    .btn-save { background-color: #28a745; color: white; }
    .btn-cancel { background-color: #ffb3b3; color: black; }
    .btn-export { background-color: #B0C4DE; color: black; }

    /* Header */
    .header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
    }
    .header-left h3 {
      color: #007BFF;
      font-weight: bold;
      margin: 0;
      letter-spacing: 0.3px;
    }
    .header-right button {
      margin-left: 8px;
    }
  </style>
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <nav class="col-md-2 sidebar d-flex flex-column">
        <div class="sidebar-header">
          <!-- Use a relative path so it works on Windows and with local servers like Live Server -->
          <img src="images/btg-logo.png" alt="BTG Logo">
          <h5>OT App</h5>
        </div>

        <!-- IMPORTANT: use data-url so JS can load the page into iframe -->
      
        <a href="#" data-url="Employee.html" class="menu-emp">Employee</a>
 <a href="" data-url="Attend.html" class="menu-att">Attendance</a>
        <a href="#" data-url="ot.html" class="menu-config">Overtime</a>
 <a href="#" data-url="approval.html" class="menu-approval">Approval</a>
      
      </nav>

      <!-- Main Content -->
      <main class="col-md-10 p-4">
       

        <!-- Iframe container -->
        <iframe id="contentFrame" class="content-area w-100" style="height:100vh; border:none;" src=""></iframe>

        <!-- Footer -->
     
      </main>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const frame = document.getElementById('contentFrame');

    // handle clicks on all sidebar links that have data-url
    const links = document.querySelectorAll('.sidebar a[data-url]');

    function activateLink(clicked) {
      links.forEach(a => a.classList.remove('active'));
      clicked.classList.add('active');
    }

    links.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const url = link.getAttribute('data-url');
        if (url) {
          frame.src = url;
          activateLink(link);
        }
      });
    });

    // load dashboard by default (if file exists)
    const defaultLink = document.querySelector('.sidebar a[data-url="dashboard.html"]') || links[0];
    if (defaultLink) {
      defaultLink.click();
    }
  });
  </script>
</body>
</html>

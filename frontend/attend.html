<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTG Overtime App - Employee Attendance</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; }
    .main-content { padding: 20px; }
    .header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .header-left h3 { color: #007BFF; font-weight: bold; margin: 0; }
    .btn-add { background-color: #1abc9c; color: white; border: none; font-weight: 500; }
    .card { border-radius: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.1); border: none; }
    .card-header { background-color: #e67e22; color: white; font-weight: 600; letter-spacing: 0.5px; }
    .table thead { background-color: #f0f0f0; color: #333; font-weight: 600; }
    footer { text-align: center; padding: 10px; background-color: #e9ecef; margin-top: 20px; }
    
    /* Delete Icon Style */
    .warning-icon { font-size: 3rem; color: #dc3545; display: block; margin-bottom: 10px; }
  </style>
</head>

<body>
  <div class="main-content">
    <div class="header-bar">
      <div class="header-left"><h3>Employee Attendance</h3></div>
<div class="header-right">
  <button class="btn btn-add" data-bs-toggle="modal" data-bs-target="#attendanceModal">Add Attendance</button>
  <button class="btn btn-success" id="exportBtn" style="background-color: #1abc9c; color:#fff;">Export to Excel</button>
</div>
    </div>

    <div class="card">
      <div class="card-header">Attendance Listing</div>
      <div class="card-body">
        <table class="table table-bordered table-striped align-middle">
          <thead>
            <tr>
              <th>Emp ID</th>
              <th>Employee Name</th>
              <th>Clock In</th>
              <th>Clock Out</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="attendanceTable">
            </tbody>
        </table>
      </div>
    </div>
    <footer>&copy;2025 BTG HRMS | Techspire Solutions</footer>
  </div>

  <div class="modal fade" id="attendanceModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">Add Attendance</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="attendanceForm">
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Employee ID</label>
                <input type="text" id="add_emp_id" class="form-control" placeholder="Enter Employee ID">
              </div>
              <div class="col-md-6">
                <label class="form-label">Employee Name</label>
                <input type="text" id="add_name" class="form-control" placeholder="Enter Employee Name">
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button class="btn btn-success" onclick="saveAttendance()">Save</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title">Edit Attendance Record</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="editForm">
            <input type="hidden" id="edit_emp_id">
            <div class="mb-3">
              <label class="form-label">Name</label>
              <input type="text" id="edit_name" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Clock In Time</label>
              <input type="datetime-local" id="edit_clock_in" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">Clock Out Time</label>
              <input type="datetime-local" id="edit_clock_out" class="form-control">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-success" onclick="updateAttendance()">Update Changes</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content text-center p-3">
        <div class="modal-body">
          <span class="warning-icon">⚠</span>
          <h5 class="fw-bold">Are you sure?</h5>
          <p class="text-muted">Do you really want to delete Employee <span id="del_display_id" class="fw-bold"></span>? This cannot be undone.</p>
          <input type="hidden" id="del_target_id">
        </div>
        <div class="d-flex justify-content-center gap-2 pb-2">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-danger" onclick="confirmDelete()">Yes, Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>

  <script>
    const API_URL = CONFIG.API_BASE_URL;

    document.getElementById('exportBtn').addEventListener('click', function() {
    // This points to your FastAPI route with the correct prefix
    const exportUrl = CONFIG.API_BASE_URL + "/api/attendance/export-excel";
    
    // Using window.location.href triggers the browser's download manager
    window.location.href = exportUrl;
  });

    // --- HELPERS ---
    function formatTime(isoString) {
      if (!isoString || isoString === "null") return "--:--";
      return new Date(isoString).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    function toLocalISO(isoString) {
      if (!isoString || isoString === "null") return "";
      const date = new Date(isoString);
      date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
      return date.toISOString().slice(0, 16);
    }

    // --- LOAD DATA ---
    async function loadAttendance() {
      const tableBody = document.getElementById("attendanceTable");
      try {
        const response = await fetch(`${API_URL}/api/attendance/`);
        const data = await response.json();
        tableBody.innerHTML = "";
        data.forEach(att => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${att.emp_id}</td>
            <td>${att.name}</td>
            <td>${formatTime(att.clock_in)}</td>
            <td>${formatTime(att.clock_out)}</td>
            <td>
              <button class="btn btn-sm btn-success" onclick="openEditModal('${att.emp_id}', '${att.name}', '${att.clock_in}', '${att.clock_out}')">Edit</button>
              <button class="btn btn-sm btn-danger" onclick="openDeleteModal('${att.emp_id}')">Delete</button>
            </td>
          `;
          tableBody.appendChild(row);
        });
      } catch (e) { tableBody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">API Error</td></tr>`; }
    }

    // --- SAVE NEW ---
    async function saveAttendance() {
      const payload = {
        emp_id: document.getElementById('add_emp_id').value,
        name: document.getElementById('add_name').value,
        clock_in: new Date().toISOString(),
        clock_out: null
      };
      const res = await fetch(`${API_URL}/api/attendance/`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if(res.ok) {
        bootstrap.Modal.getInstance(document.getElementById('attendanceModal')).hide();
        loadAttendance();
      }
    }

    // --- EDIT LOGIC ---
    function openEditModal(id, name, cin, cout) {function formatTime(timeValue) {
  if (!timeValue) return null;

  const date = new Date(timeValue);
  let hours = date.getHours();
  let minutes = date.getMinutes();

  const ampm = hours >= 12 ? "PM" : "AM";
  hours = hours % 12;
  hours = hours ? hours : 12; // 0 becomes 12
  minutes = minutes.toString().padStart(2, "0");

  return `${hours}:${minutes} ${ampm}`;
}

      document.getElementById('edit_emp_id').value = id;
      document.getElementById('edit_name').value = name;
      document.getElementById('edit_clock_in').value = toLocalISO(cin);
      document.getElementById('edit_clock_out').value = toLocalISO(cout);
      new bootstrap.Modal(document.getElementById('editModal')).show();
    }



async function updateAttendance() {
  const empId = document.getElementById('edit_emp_id').value;

  const payload = {
    emp_id: empId,
    name: document.getElementById('edit_name').value,
    clock_in: formatTime(document.getElementById('edit_clock_in').value),
    clock_out: formatTime(document.getElementById('edit_clock_out').value)
  };

  console.log("Sending payload:", payload); // Debug

  const res = await fetch(`${API_URL}/api/attendance/${empId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  if (!res.ok) {
    const err = await res.text();
    console.error("API Error:", err);
    alert("Update failed: " + err);
    return;
  }

  bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
  loadAttendance();
}


    // --- DELETE LOGIC ---
    function openDeleteModal(id) {
      document.getElementById('del_target_id').value = id;
      document.getElementById('del_display_id').innerText = id;
      new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }

    async function confirmDelete() {
      const id = document.getElementById('del_target_id').value;
      const res = await fetch(`${API_URL}/api/attendance/${id}`, { method: "DELETE" });
      if(res.ok) {
        bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
        loadAttendance();
      }
    }

    window.onload = loadAttendance;
  </script>
</body>
</html>
